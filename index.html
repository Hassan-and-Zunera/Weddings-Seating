<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Seat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fdfbf7;
            --primary-color: #2c3e35; /* Deep elegant green/sage tone */
            --accent-color: #b89c72; /* Soft gold */
            --text-color: #4a4a4a;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 40px 20px;
            display: flex;
            flex-direction: column; /* Allows logo to stack above the box */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Sizing and spacing for your logo outside the box */
        .wedding-logo {
            max-width: 120px;
            height: auto;
            margin-bottom: 25px; /* Creates elegant spacing above the white card */
            display: block;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            padding: 40px 20px;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(184, 156, 114, 0.2);
        }

        .header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 400;
            color: var(--primary-color);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .header p {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: var(--accent-color);
            margin-bottom: 35px;
        }

        .search-box {
            position: relative;
            margin-bottom: 25px;
        }

        .search-box input {
            width: 100%;
            padding: 16px 20px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
            background-color: #fafafa;
        }

        .search-box input:focus {
            border-color: var(--accent-color);
            background-color: #ffffff;
            box-shadow: 0 5px 15px rgba(184, 156, 114, 0.1);
        }

        /* Results Section */
        .results-container {
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .result-card {
            background: #fdfcf9;
            border: 1px solid rgba(184, 156, 114, 0.15);
            padding: 25px;
            border-radius: 8px;
            width: 100%;
            animation: fadeIn 0.4s ease forwards;
            margin-bottom: 12px;
        }

        .guest-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .table-assignment {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .no-results, .instruction {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: #8c8c8c;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Subtle decorative element */
        .divider {
            width: 50px;
            height: 1px;
            background-color: var(--accent-color);
            margin: 0 auto 25px auto;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <img src="3.png" class="wedding-logo" alt="Wedding Logo">

    <div class="container">
        <div class="header">
            <h1>Welcome</h1>
            <p>Please Find Your Seat</p>
        </div>
        
        <div class="divider"></div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Type your name here..." autocomplete="off">
        </div>

        <div class="results-container" id="resultsContainer">
            <p class="instruction">Enter your first or last name to view your table assignment.</p>
        </div>
    </div>

    <script>
        // --- WEDDING GUEST DATA ---
        const guestList = [
            { name: "Hassan Hafiz", table: "Table 1" },
            { name: "Zunera Amjad", table: "Table 1" },
            { name: "Nayeer Afzal", table: "Table 2" },
            { name: "Muhammed Hafiz", table: "Table 2" },
            { name: "Amaan", table: "Table 2" },
            { name: "Shehzana", table: "Table 2" },
            { name: "Aleena", table: "Table 2" },
            { name: "Nasreen Raja", table: "Table 3" },
            { name: "Banaras Raja", table: "Table 3" },
            { name: "Sohail", table: "Table 3" },
            { name: "Yasmin", table: "Table 3" },
            { name: "Lana", table: "Table 3" },
            { name: "Roee", table: "Table 3" },
            { name: "Nazish", table: "Table 3" },
            { name: "Hammad", table: "Table 3" },
            { name: "Safaa", table: "Table 3" },
            { name: "Hania", table: "Table 3" },
            { name: "Saima", table: "Table 3" },
            { name: "Faisal", table: "Table 3" },
            { name: "Hashim", table: "Table 3" },
            { name: "Talha", table: "Table 3" },
            { name: "Yaqoob", table: "Table 3" },
            { name: "Rukhsana Wahid", table: "Table 4" },
            { name: "Uzma", table: "Table 4" },
            { name: "Rizwan", table: "Table 4" },
            { name: "Idrees", table: "Table 4" },
            { name: "Aadam", table: "Table 4" },
            { name: "Anisa", table: "Table 4" },
            { name: "Sajid", table: "Table 4" },
            { name: "Yaqoob", table: "Table 4" },
            { name: "Ayra", table: "Table 4" },
            { name: "Nosheen", table: "Table 4" },
            { name: "Waseem", table: "Table 4" },
            { name: "Amelia", table: "Table 4" },
            { name: "Anaya", table: "Table 4" },
            { name: "Hamzah", table: "Table 4" },
            { name: "Rumena", table: "Table 4" }
        ];

        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');

        searchInput.addEventListener('input', function() {
            const query = this.value.trim().toLowerCase();
            
            if (query === "") {
                resultsContainer.innerHTML = '<p class="instruction">Enter your first or last name to view your table assignment.</p>';
                return;
            }

            const filteredGuests = guestList.filter(guest => 
                guest.name.toLowerCase().includes(query)
            );

            if (filteredGuests.length > 0) {
                resultsContainer.innerHTML = "";
                
                filteredGuests.forEach(guest => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.innerHTML = `
                        <div class="guest-name">${guest.name}</div>
                        <div class="table-assignment">${guest.table}</div>
                    `;
                    resultsContainer.appendChild(card);
                });
            } else {
                resultsContainer.innerHTML = '<p class="no-results">No seat found. Please try checking the spelling or typing your last name.</p>';
            }
        });
    </script>
</body>
</html>
